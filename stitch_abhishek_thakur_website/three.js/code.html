<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_4 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_4" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_4');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

renderer.setSize(width, height);
container.appendChild(renderer.domElement);

// Create a stylized 3D Glass Bottle / Flask (representing formulation)
const bottleGroup = new THREE.Group();

const bodyGeo = new THREE.CylinderGeometry(0.5, 0.7, 2, 32);
const bodyMat = new THREE.MeshPhongMaterial({ 
    color: 0xffffff, 
    transparent: true, 
    opacity: 0.3, 
    shininess: 100 
});
const body = new THREE.Mesh(bodyGeo, bodyMat);
bottleGroup.add(body);

const neckGeo = new THREE.CylinderGeometry(0.2, 0.5, 0.5, 32);
const neck = new THREE.Mesh(neckGeo, bodyMat);
neck.position.y = 1.25;
bottleGroup.add(neck);

// Liquid inside
const liquidGeo = new THREE.CylinderGeometry(0.45, 0.65, 1.5, 32);
const liquidMat = new THREE.MeshPhongMaterial({ color: 0xe65100 }); // Orange
const liquid = new THREE.Mesh(liquidGeo, liquidMat);
liquid.position.y = -0.2;
bottleGroup.add(liquid);

scene.add(bottleGroup);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

camera.position.z = 5;

function animate() {
    requestAnimationFrame(animate);
    bottleGroup.rotation.y += 0.01;
    bottleGroup.position.y = Math.sin(Date.now() * 0.002) * 0.1;
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_4 -->
</body>
</html>
